# pipeline-ci.yml — per-project CI merge gate (PR L, Layer 2).
# Written to .github/workflows/pipeline-ci.yml by bootstrap-project.sh, which fills
# pytest --cov=src --cov-branch/python -c "import src.main" from its --test/--build flags (same channel as smoke.env).
# <INSTALL_CMD> and <COVERAGE_FLOOR> are filled by the implementation/testing agents when
# the stack is known (the floor mirrors test-conventions — the SAME figure the local gate
# rides, so CI and the local gate can't disagree about the bar).
#
# WHY: the pipeline's gates run pre-merge on the AUTHOR'S machine. CI re-RUNS every
# objective check on the merge commit — it never re-reads .pipeline/ artifacts (those are
# the author's claims; re-execution is the only honest verification). Agent-judgment gates
# (criteria mapping, reconciliations) remain pre-merge guarantees; branch protection +
# required human review are their CI-side counterpart. See docs/ci-merge-gate-plan.md.
#
# The re-run scripts live in scripts/ci/ — copied INTO this repo at bootstrap (committed,
# human-reviewed, pinned at the bootstrap-time version) so CI never fetches them remotely.
# SCAN_BASE rescopes their diff to merge-base…HEAD (git diff HEAD is empty on a merge commit).
#
# Waivers: CI honors ONLY committed, tool-native ignore files (osv-scanner.toml,
# .trivyignore, .semgrepignore) — visible in the diff, human-reviewed. The local-only
# .pipeline/waivers.json never reaches CI by design. asvs-sast + source markers are
# fix-not-waive: no ignore path is offered.
#
# Supply-chain conventions: first-party actions pinned by commit SHA; scanners run from
# their official images, version-tagged — pin image DIGESTS on first CI run (same posture
# as exact-pin deps). Least-privilege permissions; per-ref concurrency; hard timeouts.
name: pipeline-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pipeline-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # PRs: scan merge-base..HEAD. Pushes to main: scan the pushed range. RAW because on a
  # first/force push `github.event.before` is the all-zeros SHA — each diff-scoped job
  # resolves it via the "Resolve scan base" step (fallback HEAD^) instead of failing
  # closed on a non-reason.
  SCAN_BASE_RAW: ${{ github.event.pull_request.base.sha || github.event.before }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies (from lockfile)
        run: |
          pip install poetry==2.4.1
          poetry install --no-root
        # `--no-root` (not `--only main`): the test job also needs the dev
        # group (pytest/httpx/testcontainers/hypothesis) to run the suite below.
      - name: Build
        run: poetry run python -c "import src.main"
      - name: Test with coverage (floor = the local gate's figure)
        run: poetry run pytest --cov=src --cov-branch
        # Fail under <COVERAGE_FLOOR>% combined lines — the same figure the local deploy
        # gate rides. Branch coverage: surface in the job summary, do NOT gate (mirrors
        # the local posture; see test-conventions).

  # mutation — U-22: run mutation testing HERE, on the Linux runner, not on the author's
  # host. mutmut needs a POSIX environment (WSL on Windows), so the local pipeline honestly
  # skips it and writes quality_ok:false (WS3-1) — the *measurement* just never happened on
  # win32, two M3-series runs in a row. This job runs it where it works. ADVISORY: it reports
  # the score in the job summary and NEVER fails the merge gate (mutation quality is
  # settled-advisory; the local WS3-1 scope-honesty check stays the only deploy-side teeth).
  # OPT-IN: fill <MUTATION_CMD> + <MUTATION_SCOPE> (the logic-dense changed modules, matching
  # test-conventions) to enable; leave the placeholders and delete this job if not using it.
  mutation:
    if: false   # flip to `true` (or a repo/branch condition) once <MUTATION_CMD> is filled
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies (from lockfile)
        run: |
          pip install poetry==2.4.1
          poetry install --no-root
      - name: Mutation testing (advisory — score to the summary, never fails the gate)
        run: |
          set +e
          <MUTATION_CMD>   # e.g. mutmut run --paths-to-mutate <MUTATION_SCOPE>
          echo "Mutation run complete (advisory; see output). This job never fails the merge gate." >> "$GITHUB_STEP_SUMMARY"
          exit 0

  sast:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Semgrep (full tree; criticals fail, warnings annotate)
        run: |
          docker run --rm -v "$PWD:/src" -w /src semgrep/semgrep:latest \
            semgrep scan --config auto --severity ERROR --error .
          # Use the same rule packs the project's semgrep-ruleset-guide names; honors a
          # committed .semgrepignore. Pin the image digest on first run.

  # codeql — deep SAST (roadmap row CQ): semantic taint/dataflow analysis beyond Semgrep's
  # pattern matching; findings surface as code-scanning ALERTS on the PR/merge commit (the
  # job fails only on analysis error, not on findings — added assurance, not a delivery
  # step). CI-only BY DESIGN: it builds a database and is slow, so it stays out of the local
  # security⇄debug⇄test loop (docs/ci-merge-gate-plan.md Layer 4). Free on public repos;
  # private repos need GitHub Advanced Security — if neither applies, delete this job (the
  # Semgrep/ASVS layers above still run). One include entry PER LANGUAGE, each paired with
  # its build mode (duplicate the entry for a second language):
  #   build-mode none — javascript-typescript, python, ruby, c-cpp, csharp, java-kotlin, rust
  #   build-mode autobuild — go
  #   swift — needs a macOS runner + autobuild/manual; deferred with the iOS roadmap row
  # NOTE: if the repo has CodeQL "default setup" enabled in Settings, disable it first —
  # it rejects uploads from advanced (workflow) configurations like this one.
  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write   # upload results to code scanning (per-job elevation)
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: <CODEQL_LANGUAGE>       # e.g. python
            build-mode: <CODEQL_BUILD_MODE>   # none | autobuild — see the table above
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"

  deps:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with: { fetch-depth: 0 }   # SCAN_BASE needs history
      - name: Resolve scan base (all-zeros on a first/force push → fall back to HEAD^)
        id: base
        run: |
          B="$SCAN_BASE_RAW"
          case "$B" in ""|0000000000000000000000000000000000000000) B="" ;; esac
          [ -n "$B" ] && git rev-parse --verify --quiet "$B^{commit}" >/dev/null || B="$(git rev-parse --verify --quiet HEAD^ || true)"
          echo "sha=$B" >> "$GITHUB_OUTPUT"
          [ -n "$B" ] || echo "::warning::no resolvable scan base (single-commit repo) — diff-scoped checks skipped this run"
      - name: OSV scan (CVSS >= 7.0 fails — the B6 floor; honors committed osv-scanner.toml)
        run: |
          docker run --rm -v "$PWD:/src" -w /src ghcr.io/google/osv-scanner:latest \
            scan --lockfile-scan-mode=all -r /src
      - name: Lockfile integrity vs merge base (exit 2 blocks; exit 1 = warn, annotated not failed)
        if: steps.base.outputs.sha != ''
        run: |
          set +e   # steps run bash -e; capture the tri-state exit code ourselves
          SCAN_BASE="${{ steps.base.outputs.sha }}" bash scripts/ci/lockfile-check.sh
          rc=$?
          set -e
          if [ "$rc" -eq 1 ]; then echo "::warning::lockfile-check reported warnings (see log)"; exit 0; fi
          exit "$rc"

  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with: { fetch-depth: 0 }   # full history — CI can afford it (local hook is diff-scoped)
      - name: Resolve scan base
        id: base
        run: |
          B="$SCAN_BASE_RAW"
          case "$B" in ""|0000000000000000000000000000000000000000) B="" ;; esac
          [ -n "$B" ] && git rev-parse --verify --quiet "$B^{commit}" >/dev/null || B="$(git rev-parse --verify --quiet HEAD^ || true)"
          echo "sha=$B" >> "$GITHUB_OUTPUT"
      - name: Gitleaks over branch history (full tree when no base resolves)
        run: |
          if [ -n "${{ steps.base.outputs.sha }}" ]; then
            docker run --rm -v "$PWD:/src" -w /src zricethezav/gitleaks:latest \
              detect --source /src --log-opts="${{ steps.base.outputs.sha }}..HEAD" --redact -v
          else
            docker run --rm -v "$PWD:/src" -w /src zricethezav/gitleaks:latest \
              detect --source /src --redact -v
          fi

  containers-iac:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Trivy fs (vuln + secret + misconfig; honors committed .trivyignore)
        run: |
          docker run --rm -v "$PWD:/src" -w /src aquasec/trivy:latest \
            fs --scanners vuln,secret,misconfig --exit-code 1 --severity HIGH,CRITICAL /src
      - name: Checkov (only when infra/ exists)
        run: |
          if [ -d infra ]; then
            docker run --rm -v "$PWD:/src" -w /src bridgecrew/checkov:latest -d /src/infra
          else echo "no infra/ — skipped"; fi

  asvs-markers:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with: { fetch-depth: 0 }
      - name: Resolve scan base
        id: base
        run: |
          B="$SCAN_BASE_RAW"
          case "$B" in ""|0000000000000000000000000000000000000000) B="" ;; esac
          [ -n "$B" ] && git rev-parse --verify --quiet "$B^{commit}" >/dev/null || B="$(git rev-parse --verify --quiet HEAD^ || true)"
          echo "sha=$B" >> "$GITHUB_OUTPUT"
      - name: ASVS Tier-1 patterns vs merge base (fix-not-waive; exit 2 fails)
        if: steps.base.outputs.sha != ''
        run: SCAN_BASE="${{ steps.base.outputs.sha }}" bash scripts/ci/asvs-sast.sh
      - name: Experimental-revert / must-not-ship markers vs merge base (fix-not-waive; exit 2 fails)
        if: steps.base.outputs.sha != ''
        run: SCAN_BASE="${{ steps.base.outputs.sha }}" bash scripts/ci/guard-source-markers.sh

  store-compliance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: App-store Tier-1 checks (repo-state scoped; no-ops on non-mobile projects)
        run: |
          mkdir -p .pipeline && echo '{}' > .pipeline/state.json   # satisfy the ambient guard
          bash scripts/ci/store-compliance.sh
          crit=$(jq -r '.critical // 0' .pipeline/store-compliance.json 2>/dev/null || echo 0)
          echo "store-compliance critical=$crit"
          [ "$crit" -eq 0 ] || exit 1   # mirror the local deploy-gate floor

  # dast-baseline — filled per docs/dast-plan.md when the app has a bootable HTTP surface:
  # boot the app (service container or <START_CMD>), run the ZAP passive baseline against
  # it, then scripts/ci/dast-review.sh vs the committed dast-budget.json (blocking on High
  # here, per the DAST plan's promotion rule). Inert until wired.
  # dast-baseline:

  # deploy-verify — the reborn post-deploy-check: probes DEPLOY_HEALTH_URL after PR N's
  # deploy workflow reports success. Inert (skipped) until PR N provides the URL.
  deploy-verify:
    if: ${{ vars.DEPLOY_HEALTH_URL != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post-deploy health probe
        run: curl -sf -m 10 "${{ vars.DEPLOY_HEALTH_URL }}" >/dev/null
