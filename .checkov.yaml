# Checkov configuration for Meterly IaC (infra/) — the committed, human-reviewed
# waiver the pipeline-ci `containers-iac` job honors. Checkov ran for the first
# time once the Trivy misconfig failures were fixed (previously the Trivy step
# failed first in the same job and short-circuited Checkov). It surfaced a broad
# set of opinionated hardening checks; the ones that are genuine quick wins were
# FIXED in the .tf (RDS IAM-auth / auto-minor-upgrade / log export / Performance
# Insights / snapshot tag-copy, ALB deletion protection + drop-invalid-headers,
# S3 CMK encryption + canary-bucket versioning, SNS encryption, and the
# security-group egress restrictions).
#
# The IDs below are the residual findings that are either false positives or
# design/scope decisions for THIS build (an API behind an ALB; CloudFront/WAF is
# prod-only edge). Each is skipped with a one-line justification rather than
# redesigned. A dedicated IaC-hardening pass (cross-region DR, WAF/CloudFront
# logging, CMK-encrypted log groups, secret rotation) is tracked as follow-up.
skip-check:
  # --- False positives ---
  - "CKV2_AWS_5"    # SGs ARE attached — passed into the compute/data modules via network module outputs; Checkov can't resolve the cross-module wiring statically.
  - "CKV_SECRET_6"  # Base64 High Entropy String on modules/data/main.tf secret_string — the value is a Terraform interpolation of a generated random_password, never a committed literal. The secrets framework ignores the inline #checkov:skip, so it is waived here.

  # --- Logging retention / encryption (design + scope) ---
  - "CKV_AWS_338"   # 90-day CloudWatch hot tier is intentional; the audit S3 archive (object-lock COMPLIANCE, 270d) carries the 12-month total.
  - "CKV_AWS_158"   # CloudWatch log groups are encrypted at rest by AWS by default; a CMK needs a logs.<region>.amazonaws.com key policy — deferred hardening.

  # --- S3 hardening (scope / cost / not-applicable) ---
  - "CKV_AWS_18"    # S3 server access logging needs a dedicated log bucket — deferred; buckets are already private (public-access-block) + KMS-encrypted + versioned.
  - "CKV_AWS_144"   # Cross-region replication is a cost/DR decision out of this build's scope; the audit archive relies on object-lock + versioning.
  - "CKV2_AWS_61"   # S3 lifecycle: the audit archive's object-lock COMPLIANCE retention governs expiry; canary artifacts are ephemeral build output.
  - "CKV2_AWS_62"   # No event-driven consumer for these buckets — S3 event notifications are not applicable.

  # --- KMS ---
  - "CKV2_AWS_64"   # The observability CMK uses the default key policy (account-root full control), which is secure; a bespoke explicit policy is deferred.

  # --- RDS / ElastiCache / Secrets (env-controlled or new-resource hardening) ---
  - "CKV_AWS_157"   # RDS Multi-AZ is env-controlled via var.db_multi_az (prod sets true); Checkov evaluates the module with the variable unresolved.
  - "CKV_AWS_118"   # RDS enhanced monitoring requires a monitoring IAM role — deferred; Performance Insights (added) already covers the primary metric need.
  - "CKV2_AWS_30"   # RDS query logging requires a custom parameter group — deferred; CloudWatch log export (postgresql/upgrade) was added.
  - "CKV_AWS_31"    # ElastiCache transit + at-rest encryption ARE enabled; a Redis AUTH token adds a managed secret and the Redis SG already restricts ingress to the task SG only.
  - "CKV2_AWS_57"   # Secrets Manager auto-rotation needs a rotation Lambda — deferred; the app role uses a generated password and the RDS master uses manage_master_user_password.

  # --- Network default SG ---
  - "CKV2_AWS_12"   # The VPC's unmanaged default security group would need an aws_default_security_group resource to lock down — deferred; all app SGs are least-privilege.

  # --- Edge module: CloudFront + WAF (PROD-ONLY; design/scope decisions) ---
  - "CKV2_AWS_28"   # The ALB is fronted by a CLOUDFRONT-scoped WAF via CloudFront, not a regional WAF bound directly to the ALB — the intended edge topology.
  - "CKV2_AWS_31"   # WAF logging configuration needs a log destination (Kinesis Firehose / S3 / CW) — deferred edge hardening.
  - "CKV2_AWS_47"   # The WAF uses AWS Managed Common + KnownBadInputs rule groups; the specific Log4j AMR is not enabled — a rule-selection decision.
  - "CKV2_AWS_32"   # CloudFront response-headers policy — deferred edge hardening (this is an API origin, not a browser-facing site).
  - "CKV2_AWS_42"   # CloudFront custom ACM certificate is provisioned per-environment out of this build's scope (same posture as the ALB listener cert).
  - "CKV_AWS_174"   # Viewer-cert minimum TLS 1.2 is not settable while on the default CloudFront cert (bound to the deferred ACM cert above).
  - "CKV_AWS_86"    # CloudFront access logging needs a dedicated log bucket — deferred edge hardening.
  - "CKV_AWS_305"   # A "default root object" is meaningless for an API distribution (no index document) — not applicable.
  - "CKV_AWS_310"   # CloudFront origin failover needs a second origin group; this is a single-region ALB origin by design.
  - "CKV_AWS_374"   # Geo restriction is intentionally "none" — Meterly is a globally reachable API.
  - "CKV_AWS_91"    # ALB access logging needs a dedicated log bucket — deferred; request-level observability is covered by the app logs + X-Ray.
